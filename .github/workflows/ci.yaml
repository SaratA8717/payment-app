name: Build and Push

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to ACR
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/payment-app:${IMAGE_TAG} .

    - name: Push Image
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/payment-app:${IMAGE_TAG}